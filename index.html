<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Q4 Seatwork 1</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"; 
rel="stylesheet">  



    <style> 

    @font-face {
        font-family: 'BebasNue' ;
        src: url(BebasNeue-Regular.ttf);
    }

    body{ 
        background: linear-gradient( to right, #304352, #d7d2cc, #304352);
        font-family: 'BebasNue';
    }

    .login-box {
        width: 400px;
        border-radius: 20px;
        background:white; 
    }

    .pfp {
       width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    margin: 0 auto 15px
    }

    h2 {

        color: #304352;
        letter-spacing:2px; 
    }

    .btn-primary {
        background-color: #304352; 
        border: none;
    }

    .btn-secondary{
        border-radius: 10px 
    }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100"> 

    <div class=" card p-4 shadow login-box">

        <h2 class="text-center"> Login </h2>
        <img src="pfpp.jpg" class="pfp"> 

        <button class="btn btn-info mb-2" onclick="showInstructions()"> Show Instructions </button>
        <p id="instructions" style="display:none;"> Enter the correct username and password</p>

        <label> Username </label>
        <input type="text" id="username" class="form-control mb-3" placeholder="Enter username">

        <label> Password </label>
        <input type="password" id="password" class="form-control mb-3" placeholder="Enter password">

        <div class="form-check mb-3"> 
            <input type="checkbox" class="form-check-input"> 
            <label class="form-check-label"> Stay logged in </label>

        </div>
        
        <br>

        <div class="d-flex justify-content-between mb-3">

            <button class="btn btn-primary w-50" onclick="login()"> Login</button>
            <button class="btn btn-secondary w-50" onclick="cancel()"> Cancel</button>
            
        </div>

    </div>
</div>

<script> 

var correctUsername = "sampleuser67";
var correctPassword = "123456";

function showInstructions() {
    var text = document.getElementById("instructions");

    if (text.style.display === "none") {
        text.style.display = "block";
    } else {
        text.style.display = "none";
    }
}

function login() {
    var username = document.getElementById("username").value;
    var password = document.getElementById("password").value;

    if (username === "" && password === "") {
        window.alert("input ur username and password");
    } 
    else if (username === "") {
        window.alert("input ur username");
    } 
    else if (password === "") {
        window.alert("input ur password");
    } 
    else if (username !== correctUsername) {
        window.alert("incorrect username");
    } 
    else if (password !== correctPassword) {
        window.alert("incorrect password");
    } 
    else {
        window.alert("Welcome " + username + "!");
    }
}

function cancel() {
    document.getElementById("username").value = "";
    document.getElementById("password").value = "";
}


</script>
    



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> 
</body>
</html>
